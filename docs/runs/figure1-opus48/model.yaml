- id: PMID:24120942
  label: Compartment-level NEURONS->INTESTINE 'endocrine signal' edge (figure Panel
    E bold dashed arrow from URX hexagon crossing into the INTESTINE box). Modeled
    as the most-downstream neuronal activity (mod-1/URX) indirectly positively regulating
    the most-upstream intestinal activity (nhr-76), since the signal travels via the
    circulatory system (endocrine) to a distant tissue. Noble, Stieglitz & Srinivasan
    2013 show the neuronal serotonin/octopamine circuit directs release of an endocrine
    signal to control intestinal body fat.
  type: gocam:PublicationObject
