- id: PMID:24120942
  label: Noble et al. 2013 show that octopamine signaling through ser-6 in AWB neurons
    is part of the integrated neuronal circuit that converges on the endocrine signal
    to the intestine. AWB (ser-6) is depicted as part of the NEURONS network feeding
    into the overall circuit that includes URX (mod-1) and the downstream endocrine
    relay; both octopamine and serotonin pathways cooperate to produce the endocrine
    signal controlling fat.
  type: gocam:PublicationObject
- id: RO:0002304
  label: causally upstream of, positive effect
  type: gocam:PredicateTermObject
- id: PMID:28128367
  label: Palamiuc et al. 2017 (Nat Commun) and Noble et al. 2013 establish that nhr-76,
    a nuclear hormone receptor in intestinal cells, directly drives expression of
    atgl-1 (ATGL/adipose triglyceride lipase). Panel E explicitly shows an arrow from
    nhr-76 to ATGL inside the intestine compartment, indicating nhr-76 transcriptionally
    activates atgl-1 to initiate lipolysis and fat catabolism.
  type: gocam:PublicationObject
- id: RO:0002629
  label: directly positively regulates
