- id: PMID:39299237
  label: 'TIR-1/SARM1 signaling adaptor activity is causally upstream, positive effect,
    of NSY-1 MAPKKK. Figure routes this through an intervening ''LRO stress / pH increase''
    node (TIR-1 -> LRO stress -> NSY-1), so the relation is indirect. Tse-Kang & Pukkila-Worley
    (Cell Reports 2024): lysosome-related organelle integrity/pH governs TIR-1 aggregation
    to control activation of the downstream p38 (NSY-1/SEK-1/PMK-1) immune cascade.'
  type: gocam:PublicationObject
- id: RO:0002407
  label: indirectly positively regulates
  type: gocam:PredicateTermObject
- id: PMID:35098926
  label: SEK-1 MAPKK directly positively regulates PMK-1 p38 MAPK by phosphorylation,
    the terminal relay of the conserved C. elegans p38 immune cascade (Peterson et
    al., eLife 2022).
  type: gocam:PublicationObject
- id: RO:0002629
  label: directly positively regulates
  type: gocam:PredicateTermObject
- id: PMID:34849877
  label: PMK-1 p38 MAPK directly positively regulates the bZIP transcription factor
    ATF-7 by phosphorylation, converting it to a transcriptional activator of innate
    immune genes (Matilainen et al., Genetics 2021; canonical p38/PMK-1 -> ATF-7).
  type: gocam:PublicationObject
- id: RO:0002304
  label: causally upstream of, positive effect
  type: gocam:PredicateTermObject
- id: PMID:34617666
  label: 'ATFS-1 transcription factor activity indirectly positively regulates HSP-60
    (transcriptional induction of the mitochondrial chaperone is the intervening module).
    Campos et al., EMBO reports 2021: ATFS-1-driven UPR^mt induces mitochondrial chaperones
    such as hsp-60. Matches the ATFS-1 -> HSP-60 figure connection.'
  type: gocam:PublicationObject
