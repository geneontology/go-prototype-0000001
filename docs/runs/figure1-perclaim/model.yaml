- id: PMID:24120942
  label: 'Endocrine-signal edge: the URX neuron circuit releases an endocrine signal
    that travels to the INTESTINE. Modeled as mod-1 activity (URX, most downstream
    neuronal node) indirectly positively regulating the nhr-76 nuclear-receptor activity
    (intestine, first intestinal node). Dashed arrow labeled ''endocrine signal''
    (URX->INTESTINE) in Panel E; endocrine transport across cells is upstream of intestinal
    signal transduction, hence indirect. Noble et al. 2013 title: ''...directs the
    release of an endocrine signal to control C. elegans body fat.'''
