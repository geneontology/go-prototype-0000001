- id: PMID:35098926
  label: 'Peterson et al. 2022 (eLife): SEK-1 (MAPKK) directly phosphorylates and
    activates PMK-1 (p38 MAPK). Canonical step in the TIR-1/SARM1-NSY-1-SEK-1-PMK-1
    innate immune cascade in C. elegans intestine.'
  type: gocam:PublicationObject
- id: RO:0002629
  label: directly positively regulates
  type: gocam:PredicateTermObject
- id: PMID:41104136
  label: 'Balasubramaniam et al. 2025 (Front. Cell. Infect. Microbiol.) review: ZIP-4
    and CEBP-1/2 are shown together in ESRE-driven antimicrobial defense gene transcription
    in C. elegans; ZIP-4 acts upstream to facilitate CEBP-1 driven transcriptional
    output.'
  type: gocam:PublicationObject
- id: PMID:34617666
  label: 'Campos et al. 2021 (EMBO Reports) ''Mild mitochondrial impairment enhances
    innate immunity and longevity through ATFS-1 and p38 signaling'': ATFS-1 (UPRmt
    TF) and PMK-1 (p38 MAPK) jointly control the innate immune response to mitochondrial
    stress in C. elegans, with ATFS-1 acting upstream to potentiate p38 pathway output.'
  type: gocam:PublicationObject
- id: RO:0002304
  label: causally upstream of, positive effect
  type: gocam:PredicateTermObject
- id: PMID:40072056
  label: 'Afridi & Tu 2025 (Cells): ATF-7 and SKN-1/Nrf2 cooperate in the C. elegans
    intestinal nucleus to drive the combined antimicrobial defense and oxidative stress
    response gene program. ATF-7 (downstream of p38) acts convergently with SKN-1
    in driving innate immune transcription.'
  type: gocam:PublicationObject
- id: PMID:39000143
  label: 'Hajdu et al. 2024 (Int. J. Mol. Sci.): The mitochondrial stress response
    (UPRmt via ATFS-1) activates HIF-1 as a downstream effector in the C. elegans
    defense response to P. aeruginosa; mtROS generated by pyocyanin also directly
    activates HIF-1.'
  type: gocam:PublicationObject
- id: PMID:40247006
  label: 'Tse-Kang, Wani & Pukkila-Worley 2025 (Nat. Rev. Immunol.): FSHR-1, a GPCR
    at the intestinal membrane, signals to NHR-86/HNF-4 nuclear receptor via a translational
    regulatory step, constituting a parallel innate immune pathway to the p38/MAPK
    cascade in C. elegans.'
  type: gocam:PublicationObject
