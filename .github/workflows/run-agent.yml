name: Run agent

# Triggered three ways:
#   1. workflow_dispatch — manual run from the Actions UI (kept for debugging)
#   2. repository_dispatch (type: run-agent) — programmatic / API
#   3. issues.opened with label `run-agent-request` — what the landing-page
#      'Submit a figure' form ends up firing once the user lands on the
#      pre-populated GitHub Issue Form and clicks Submit
on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Public URL of the input pathway figure (PNG/JPG)"
        required: true
      species:
        description: "Species (free-text, e.g., 'Caenorhabditis elegans')"
        required: false
        default: "Caenorhabditis elegans"
      species_taxon:
        description: "NCBITaxon CURIE (e.g., 'NCBITaxon:6239')"
        required: false
        default: ""
      process_hint:
        description: "Optional biological-process hint (free-text)"
        required: false
        default: ""
      run_id:
        description: "Override run id; default is a UTC timestamp"
        required: false
        default: ""

  repository_dispatch:
    types: [run-agent]

  issues:
    types: [opened, labeled]

concurrency:
  group: run-agent-${{ github.event.client_payload.run_id || github.event.inputs.run_id || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    # For `issues` events, only fire when the run-agent-request label is present.
    # Other event types always run.
    if: |
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'run-agent-request')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Write Vertex SA key
        env:
          GCP_KEY: ${{ secrets.GCP_VERTEX_SA_KEY }}
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "::error::GCP_VERTEX_SA_KEY repo secret is not set."
            exit 1
          fi
          printf '%s' "$GCP_KEY" > "$RUNNER_TEMP/sa.json"
          chmod 600 "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
          # The SA JSON already carries the GCP project ID — read it from
          # there rather than hardcoding it in this public workflow file.
          project_id=$(jq -r '.project_id' "$RUNNER_TEMP/sa.json")
          if [ -z "$project_id" ] || [ "$project_id" = "null" ]; then
            echo "::error::Could not read .project_id from the SA JSON."
            exit 1
          fi
          echo "ANTHROPIC_VERTEX_PROJECT_ID=$project_id" >> "$GITHUB_ENV"

      - name: Configure Vertex env
        run: |
          {
            echo "CLAUDE_CODE_USE_VERTEX=1"
            echo "CLOUD_ML_REGION=us-east5"
            echo "ANTHROPIC_DEFAULT_SONNET_MODEL=claude-sonnet-4-6@default"
            echo "ANTHROPIC_DEFAULT_OPUS_MODEL=claude-opus-4-6@default"
            echo "ANTHROPIC_DEFAULT_HAIKU_MODEL=claude-haiku-4-5@20251001"
          } >> "$GITHUB_ENV"

      # When the trigger is an issue (the user submitted the GH Issue Form),
      # extract each field's value from the issue body. GH renders form
      # answers as "### Field Label\n\nvalue\n\n" sections; the parser keys
      # off the field LABEL (lowercased, underscores) — but the labels are
      # human-readable ("Image URL", "Image upload (drag & drop a local file)")
      # so we normalize parens-suffixes off and map a few label-variants back
      # to the canonical field ids the workflow uses below.
      # The `image_upload` field is a textarea where GH renders any drag-uploaded
      # image as `![name](https://user-attachments...)` markdown; we extract the
      # first URL from that markdown and prefer it over the typed Image URL.
      - name: Parse issue form
        if: github.event_name == 'issues'
        id: parse-issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/parsed.json"
          import json, os, re
          body = os.environ.get("ISSUE_BODY") or ""
          # Label → canonical id. Anything not listed here is normalized as
          # lowercase + spaces->underscores (preserving back-compat with older
          # template revisions).
          LABEL_TO_ID = {
              "image url": "image_url",
              "image upload (drag & drop a local file)": "image_upload",
              "image upload": "image_upload",
              "species": "species",
              "species taxon": "species_taxon",
              "process hint": "process_hint",
              "run id": "run_id",
          }
          fields = {}
          for m in re.finditer(r'^### ([^\n]+)\n+(.*?)(?=\n### |\Z)', body, re.MULTILINE | re.DOTALL):
              label = m.group(1).strip().lower()
              value = m.group(2).strip()
              if value == "_No response_":
                  value = ""
              key = LABEL_TO_ID.get(label, label.replace(' ', '_'))
              fields[key] = value

          # If the user dragged an image into image_upload, GH rendered it as
          # `![filename](https://user-attachments.githubusercontent.com/...)` or
          # `<img ... src="https://user-attachments...">`. Either way, pull the
          # first URL out and route it to image_url. Prefer user-attachments
          # links over arbitrary pasted URLs, since those are the explicit
          # uploads.
          upload_raw = fields.get("image_upload", "") or ""
          uploaded_url = ""
          # Markdown image syntax first.
          for m in re.finditer(r'!\[[^\]]*\]\((https?://[^)\s]+)\)', upload_raw):
              uploaded_url = m.group(1); break
          # Bare HTML <img src=...>.
          if not uploaded_url:
              m = re.search(r'<img[^>]+src=["\'](https?://[^"\']+)', upload_raw)
              if m: uploaded_url = m.group(1)
          # Last resort: bare URL on its own line.
          if not uploaded_url:
              m = re.search(r'(https?://\S+)', upload_raw)
              if m: uploaded_url = m.group(1)

          if uploaded_url:
              fields["image_url"] = uploaded_url  # uploaded wins per template

          print(json.dumps(fields, indent=2))
          PY
          cat "$RUNNER_TEMP/parsed.json"
          {
            echo "image_url=$(jq -r '.image_url // ""' "$RUNNER_TEMP/parsed.json")"
            echo "species=$(jq -r '.species // ""' "$RUNNER_TEMP/parsed.json")"
            echo "species_taxon=$(jq -r '.species_taxon // ""' "$RUNNER_TEMP/parsed.json")"
            echo "process_hint<<HEREDOC_PROCESS"
            jq -r '.process_hint // ""' "$RUNNER_TEMP/parsed.json"
            echo "HEREDOC_PROCESS"
            echo "run_id=$(jq -r '.run_id // ""' "$RUNNER_TEMP/parsed.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve input
        id: inputs
        env:
          ISSUE_IMG_URL:      ${{ steps.parse-issue.outputs.image_url }}
          ISSUE_SPECIES:      ${{ steps.parse-issue.outputs.species }}
          ISSUE_TAXON:        ${{ steps.parse-issue.outputs.species_taxon }}
          ISSUE_PROCESS_HINT: ${{ steps.parse-issue.outputs.process_hint }}
          ISSUE_RUN_ID:       ${{ steps.parse-issue.outputs.run_id }}
          PAYLOAD_IMG_URL:      ${{ github.event.client_payload.image_url }}
          PAYLOAD_SPECIES:      ${{ github.event.client_payload.species }}
          PAYLOAD_TAXON:        ${{ github.event.client_payload.species_taxon }}
          PAYLOAD_PROCESS_HINT: ${{ github.event.client_payload.process_hint }}
          PAYLOAD_RUN_ID:       ${{ github.event.client_payload.run_id }}
          DISPATCH_IMG_URL:      ${{ github.event.inputs.image_url }}
          DISPATCH_SPECIES:      ${{ github.event.inputs.species }}
          DISPATCH_TAXON:        ${{ github.event.inputs.species_taxon }}
          DISPATCH_PROCESS_HINT: ${{ github.event.inputs.process_hint }}
          DISPATCH_RUN_ID:       ${{ github.event.inputs.run_id }}
        run: |
          first_nonempty() {
            for v in "$@"; do
              if [ -n "$v" ]; then
                printf '%s' "$v"
                return
              fi
            done
          }
          IMG_URL="$(first_nonempty "$ISSUE_IMG_URL" "$PAYLOAD_IMG_URL" "$DISPATCH_IMG_URL")"
          SPECIES="$(first_nonempty "$ISSUE_SPECIES" "$PAYLOAD_SPECIES" "$DISPATCH_SPECIES")"
          SPECIES_TAXON="$(first_nonempty "$ISSUE_TAXON" "$PAYLOAD_TAXON" "$DISPATCH_TAXON")"
          PROCESS_HINT="$(first_nonempty "$ISSUE_PROCESS_HINT" "$PAYLOAD_PROCESS_HINT" "$DISPATCH_PROCESS_HINT")"
          RUN_ID="$(first_nonempty "$ISSUE_RUN_ID" "$PAYLOAD_RUN_ID" "$DISPATCH_RUN_ID")"
          if [ -z "$IMG_URL" ]; then
            echo "::error::No image_url provided (issue form / workflow inputs / repository_dispatch payload)."
            exit 1
          fi
          # Always settle on a concrete run_id so the commit and the comment URL agree.
          if [ -z "$RUN_ID" ]; then
            RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)"
          fi
          # Bash port of src/gocam_prototype/cli.py:_slugify — keep the URL we
          # quote back to the user identical to the directory the CLI writes
          # under docs/runs/. GH Pages is case-sensitive, so a mismatched
          # uppercase/lowercase letter is a guaranteed 404.
          slugify() {
            local s="${1,,}"
            s="${s//[^a-z0-9-]/-}"
            while [[ "$s" == *--* ]]; do s="${s//--/-}"; done
            s="${s#-}"; s="${s%-}"; s="${s:0:60}"
            [ -z "$s" ] && s="run"
            printf '%s' "$s"
          }
          RUN_ID="$(slugify "$RUN_ID")"
          {
            echo "img_url=$IMG_URL"
            echo "species=${SPECIES:-Caenorhabditis elegans}"
            echo "species_taxon=$SPECIES_TAXON"
            echo "process_hint<<HEREDOC_PROCESS"
            echo "$PROCESS_HINT"
            echo "HEREDOC_PROCESS"
            echo "run_id=$RUN_ID"
            echo "run_url=https://geneontology.github.io/go-prototype-0000001/runs/$RUN_ID/"
          } >> "$GITHUB_OUTPUT"

      - name: Acknowledge issue (queued)
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🚀 Run queued. Draft model will be published at ${{ steps.inputs.outputs.run_url }} once the agent finishes (typically 2-5 minutes)."

      - name: Fetch input image
        run: |
          mkdir -p /tmp/agent-input
          curl -sSL "${{ steps.inputs.outputs.img_url }}" -o /tmp/agent-input/figure
          file /tmp/agent-input/figure

      - name: Run agent
        run: |
          extra=()
          [ -n "${{ steps.inputs.outputs.species_taxon }}" ] && extra+=(--species-taxon "${{ steps.inputs.outputs.species_taxon }}")
          [ -n "${{ steps.inputs.outputs.process_hint }}"  ] && extra+=(--process-hint  "${{ steps.inputs.outputs.process_hint }}")
          uv run gocam-prototype run \
            --image /tmp/agent-input/figure \
            --species "${{ steps.inputs.outputs.species }}" \
            --run-id "${{ steps.inputs.outputs.run_id }}" \
            "${extra[@]}"

      - name: Commit run
        run: |
          git config user.name  "gocam-prototype-bot"
          git config user.email "bot@geneontology.org"
          git add docs/runs/ docs/index.html
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "Agent run ${{ steps.inputs.outputs.run_id }}

          Triggered by ${{ github.event_name }} on ${{ steps.inputs.outputs.img_url }}
          Species: ${{ steps.inputs.outputs.species }}"
          git push origin HEAD:main

      - name: Comment success on issue + close
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "✅ Draft model is live: ${{ steps.inputs.outputs.run_url }}"
          gh issue close "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed

      - name: Comment failure on issue
        if: github.event_name == 'issues' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "❌ Agent run failed for run id \`${{ steps.inputs.outputs.run_id }}\`. See workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
